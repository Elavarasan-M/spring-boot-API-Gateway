server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/products/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**

            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/payments/**